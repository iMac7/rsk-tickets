type Shop @entity {
  id: ID!                  # shop address
  creator: Bytes!
  name: String!
  eventDate: BigInt!
  price: BigInt!
  createdAtBlock: BigInt!
  createdAtTimestamp: BigInt!
  purchases: [Purchase!]! @derivedFrom(field: "shop")
}

type Purchase @entity {
  id: ID!                  # "<shop>-<purchaseId>"
  shop: Shop!
  purchaseId: BigInt!
  buyer: Bytes!
  unlockTimestamp: BigInt!
  amountPaid: BigInt
  finalized: Boolean!
  refunded: Boolean!
  queuedAtBlock: BigInt!
  queuedAtTimestamp: BigInt!
  finalizedAtBlock: BigInt
  refundedAtBlock: BigInt
}
