type TicketShop @entity(immutable: false) {
  id: Bytes!
  creator: Bytes!
  name: String!
  eventDate: BigInt!
  price: BigInt!
  createdAtBlockNumber: BigInt!
  createdAtTimestamp: BigInt!
  createdAtTransactionHash: Bytes!
  purchases: [Purchase!]! @derivedFrom(field: "shop")
}

type Purchase @entity(immutable: false) {
  id: String!
  shop: TicketShop!
  purchaseId: BigInt!
  buyer: Bytes!
  unlockTimestamp: BigInt!
  amountPaid: BigInt!
  queuedBlockNumber: BigInt!
  queuedBlockTimestamp: BigInt!
  queuedTransactionHash: Bytes!
  finalized: Boolean!
  finalizedBlockNumber: BigInt
  finalizedBlockTimestamp: BigInt
  finalizedTransactionHash: Bytes
  refunded: Boolean!
  refundedBlockNumber: BigInt
  refundedBlockTimestamp: BigInt
  refundedTransactionHash: Bytes
}
