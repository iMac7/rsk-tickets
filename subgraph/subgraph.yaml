specVersion: 1.3.0
indexerHints:
  prune: auto
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: TicketShopFactory
    network: rootstock-testnet
    source:
      address: "0x730CF5DDf1799754Ac0B54c308AA52bA2B706cAb"
      abi: TicketShopFactory
      startBlock: 7482612
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - TicketShop
      abis:
        - name: TicketShopFactory
          file: ./abis/TicketShopFactory.json
      eventHandlers:
        - event: TicketShopDeployed(indexed address,indexed address,string,uint256,uint256)
          handler: handleTicketShopDeployed
      file: ./src/ticket-shop-factory.ts
templates:
  - kind: ethereum/contract
    name: TicketShop
    network: rootstock-testnet
    source:
      abi: TicketShop
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - TicketShop
        - Purchase
      abis:
        - name: TicketShop
          file: ./abis/TicketShop.json
      eventHandlers:
        - event: PurchaseQueued(indexed uint256,indexed address,uint256)
          handler: handlePurchaseQueued
        - event: PurchaseFinalized(indexed uint256,indexed address)
          handler: handlePurchaseFinalized
        - event: PurchaseRefunded(indexed uint256,indexed address)
          handler: handlePurchaseRefunded
      file: ./src/ticket-shop.ts
